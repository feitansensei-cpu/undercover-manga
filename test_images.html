  p{color:#aaa;font-size:13px;margin-bottom:12px}
  #stats{margin-bottom:12px;font-size:14px;color:#aaa;font-weight:600}
  #startbtn{background:#e03535;font-size:15px;font-weight:700;padding:12px 28px;border-radius:8px;margin-bottom:20px;border:none;color:#fff;cursor:pointer}
  .series{margin-bottom:28px}
  .sh{display:flex;align-items:center;gap:10px;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid #222}
  .stitle{font-size:15px;font-weight:800;color:#e03535}
  .scount{font-size:11px;color:#555;background:#1a1a1a;padding:2px 8px;border-radius:10px}
  .sok{font-size:11px;color:#22c55e;margin-left:auto}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px}
  .card{background:#1a1a1a;border-radius:8px;overflow:hidden;text-align:center}
  .card img{width:100%;height:140px;object-fit:cover;object-position:top;display:block}
  .nm{font-size:9px;padding:5px 4px 2px;line-height:1.3;font-weight:600}
  .st{font-size:8px;padding:0 4px 5px}
  .ok{border:2px solid #22c55e}
  .fail{border:2px solid #ef4444}
  .pending{border:2px solid #333}
  .ph{width:100%;height:140px;display:flex;align-items:center;justify-content:center;font-size:32px;background:#111}
  #failbox{background:#1a0a0a;border:1px solid #e03535;border-radius:8px;padding:14px;display:none;margin-top:20px}
  #failbox h2{color:#e03535;font-size:13px;margin:0 0 8px}
  #failbox p{font-size:11px;color:#ccc;margin:3px 0;font-family:monospace}
</style>

function sleep(ms){return new Promise(function(r){setTimeout(r,ms);})}

async function fetchImg(name){
  var n=NM[name]||name;
  try{
    var r=await fetch('https://api.jikan.moe/v4/characters?q='+encodeURIComponent(n)+'&limit=1');
    var d=await r.json();
    if(d&&d.data&&d.data[0]&&d.data[0].images&&d.data[0].images.jpg)
      return d.data[0].images.jpg.image_url||null;
  }catch(e){}
  await sleep(300);
  try{
    var q='query($n:String){Character(search:$n){image{large}}}';
    var r=await fetch('https://graphql.anilist.co',{method:'POST',
      headers:{'Content-Type':'application/json','Accept':'application/json'},
      body:JSON.stringify({query:q,variables:{n:n}})});
    var d=await r.json();
    if(d&&d.data&&d.data.Character&&d.data.Character.image&&d.data.Character.image.large)
      return d.data.Character.image.large;
  }catch(e){}
  return null;
}

async function startTest(){
  document.getElementById('startbtn').style.display='none';
  var content=document.getElementById('content');
  var totalOk=0,totalFail=0,totalChars=0,problems=[];
  SERIES.forEach(function(s){totalChars+=s.chars.length;});

  SERIES.forEach(function(s){
    var sec=document.createElement('div');
    sec.className='series';
    var sid=s.name.replace(/\W/g,'_');
    sec.innerHTML='<div class="sh"><span class="stitle">'+s.name+'</span><span class="scount">'+s.chars.length+' perso</span><span class="sok" id="ok_'+sid+'"></span></div><div class="grid" id="grid_'+sid+'"></div>';
    content.appendChild(sec);
    var grid=document.getElementById('grid_'+sid);
    s.chars.forEach(function(name){
      var c=document.createElement('div');
      c.className='card pending';c.id='c_'+name.replace(/\W/g,'_');
      c.innerHTML='<div class="ph">&#x23F3;</div><div class="nm">'+name+'</div><div class="st">...</div>';
      grid.appendChild(c);
    });
  });

  var done=0;
  for(var si=0;si<SERIES.length;si++){
    var s=SERIES[si];
    var sid=s.name.replace(/\W/g,'_');
    var sok=0;
    for(var ci=0;ci<s.chars.length;ci++){
      var name=s.chars[ci];
      var c=document.getElementById('c_'+name.replace(/\W/g,'_'));
      var url=await fetchImg(name);
      done++;
      if(url){
        totalOk++;sok++;
        c.className='card ok';
        c.innerHTML='<img src="'+url+'" alt="'+name+'"><div class="nm">'+name+'</div><div class="st" style="color:#22c55e">OK</div>';
      }else{
        totalFail++;
        problems.push(name+' ('+(NM[name]||name)+')');
        c.className='card fail';
        c.innerHTML='<div class="ph">&#x274C;</div><div class="nm">'+name+'</div><div class="st" style="color:#ef4444">echec</div>';
      }
      document.getElementById('stats').textContent=done+'/'+totalChars+' — OK: '+totalOk+' Echecs: '+totalFail;
      await sleep(800);
    }
    document.getElementById('ok_'+sid).textContent='✅ '+sok+'/'+s.chars.length;
  }

  document.getElementById('stats').textContent='TERMINE — OK: '+totalOk+' Echecs: '+totalFail+' sur '+totalChars;
  if(problems.length){
    document.getElementById('failbox').style.display='block';
    document.getElementById('failnames').innerHTML=problems.map(function(p){return'<p>'+p+'</p>';}).join('');
  }
}
