<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Test Images AniList</title>
<style>
  body { background:#0a0a0a; color:#fff; font-family:sans-serif; padding:20px; }
  h1 { color:#e03535; margin-bottom:4px; }
  #stats { margin-bottom:16px; font-size:14px; color:#aaa; }
  #filter { margin-bottom:16px; display:flex; gap:8px; flex-wrap:wrap; }
  button { background:#333; border:none; color:#fff; padding:6px 14px; border-radius:6px; cursor:pointer; font-size:12px; }
  button.active { background:#e03535; }
  .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(110px,1fr)); gap:10px; }
  .card { background:#1a1a1a; border-radius:8px; overflow:hidden; text-align:center; }
  .card img { width:100%; height:130px; object-fit:cover; object-position:top; display:block; }
  .card .name { font-size:9px; padding:4px; line-height:1.3; font-weight:600; }
  .card .status { font-size:9px; padding:2px 4px 4px; }
  .card.ok { border:2px solid #22c55e; }
  .card.fail { border:2px solid #ef4444; }
  .card.pending { border:2px solid #444; }
  .placeholder { width:100%;height:130px;display:flex;align-items:center;justify-content:center;font-size:28px; background:#111; }
  #fail-list { margin-top:24px; background:#1a0a0a; border:1px solid #e03535; border-radius:8px; padding:14px; display:none; }
  #fail-list h2 { color:#e03535; font-size:13px; margin:0 0 8px; }
  #fail-list p { font-size:11px; color:#ccc; margin:3px 0; font-family:monospace; }
</style>
</head>
<body>
<h1>🔍 Test Images — 130 personnages</h1>
<div id="stats">En attente...</div>
<div id="filter">
  <button class="active" onclick="filter('all',this)">Tous</button>
  <button onclick="filter('ok',this)">✅ OK</button>
  <button onclick="filter('fail',this)">❌ Échecs</button>
</div>
<div class="grid" id="grid"></div>
<div id="fail-list">
  <h2>❌ Personnages sans image — noms à corriger dans ANILIST_NAME_MAP</h2>
  <div id="fail-names"></div>
</div>

<script>
const NAME_MAP = {
    'Ryomen Sukuna':'Sukuna','Monkey D. Luffy':'Luffy','Roronoa Zoro':'Zoro',
    'Portgas D. Ace':'Ace','Mob (Kageyama Shigeo)':'Shigeo Kageyama','Son Goku':'Goku',
    'L Lawliet':'L','DIO':'Dio Brando','Pain (Nagato)':'Nagato',
    'Lelouch vi Britannia':'Lelouch Lamperouge','Seiya de Pégase':'Pegasus Seiya',
    'Ikki de Phénix':'Phoenix Ikki','Makunouchi Ippo':'Ippo Makunouchi',
    'Shoyo Hinata':'Hinata Shoyo','Tobio Kageyama':'Kageyama Tobio',
    'Keiji Akaashi':'Akaashi Keiji','Bakugo Katsuki':'Katsuki Bakugo',
    'Gojo Satoru':'Satoru Gojo','Ainz Ooal Gown':'Ainz Ooal Gown',
    'Rimuru Tempest':'Rimuru','Subaru Natsuki':'Natsuki Subaru',
    'Yuji Itadori':'Itadori Yuuji','Megumi Fushiguro':'Fushiguro Megumi',
    'Nanami Kento':'Nanami Kento','Toji Fushiguro':'Fushiguro Toji',
    'Yu Kanda':'Yuu Kanda','Ging Freecss':'Ging Freecs',
    'Kishou Arima':'Arima Kishou','Reigen Arataka':'Arataka Reigen',
    'Thorfinn':'Thorfinn Karlsefni',
};

const CHARS = ['Ainz Ooal Gown','Aki Hayakawa','Allen Walker','Alphonse Elric','Armin Arlert','Askeladd','Asta','Baki Hanma','Bakugo Katsuki','Ban','Bardock','Byakuya Kuchiki','Chrollo Lucilfer','DIO','Death the Kid','Denji','Doflamingo','Edward Elric','Eren Yeager','Erza Scarlet','Eustass Kid','Father','Frieren','Frieza','Garou','Genos','Ging Freecss','Giorno Giovanna','Giyu Tomioka','Gojo Satoru','Gon Freecss','Griffith','Grimmjow Jaegerjaquez','Guts','Hiei','Himiko Toga','Himmel','Hinata Hyuga','Hisoka Morow','Ichigo Kurosaki','Ikki de Phénix','Illumi Zoldyck','Itachi Uchiha','Izuku Midoriya','Jiraiya','Joseph Joestar','Jotaro Kujo','Kakashi Hatake','Keiji Akaashi','Ken Kaneki','Kenpachi Zaraki','Killua Zoldyck','Kirito','Kishou Arima','Kokushibo','Kurapika','L Lawliet','Lelouch vi Britannia','Levi Ackerman','Light Yagami','Loid Forger','Maka Albarn','Makima','Makunouchi Ippo','Megumi Fushiguro','Meliodas','Meruem','Might Guy','Mikasa Ackerman','Millennium Earl','Minato Namikaze','Mob (Kageyama Shigeo)','Monkey D. Luffy','Mugen','Muichiro Tokito','Nanami Kento','Naruto Uzumaki','Natsu Dragneel','Neji Hyuga','Netero','Nico Robin','Obito Uchiha','Orochimaru','Pain (Nagato)','Portgas D. Ace','Power','Reigen Arataka','Reiner Braun','Rem','Rengoku Kyojuro','Rimuru Tempest','Rock Lee','Roronoa Zoro','Roswaal','Roy Mustang','Rukia Kuchiki','Ryomen Sukuna','Sabo','Saitama','Sakura Haruno','Sasuke Uchiha','Seiya de Pégase','Shanks','Shikamaru Nara','Shinra Kusakabe','Shoyo Hinata','Son Goku','Sosuke Aizen','Spike Spiegel','Subaru Natsuki','Tanjiro Kamado','Tetsuo Shima','Thorfinn','Tobio Kageyama','Toji Fushiguro','Touka Kirishima','Trafalgar Law','Ulquiorra Cifer','Vegeta','Whitebeard','Yami Sukehiro','Yato','Yor Forger','Yoshikage Kira','Yu Kanda','Yuji Itadori','Yuno','Yusuke Urameshi','Zenitsu Agatsuma','Zuko'];

let ok=0, fail=0, done=0;
const fails=[];

async function fetchImg(name) {
    const n = NAME_MAP[name] || name;
    const q = `query($n:String){Character(search:$n){image{large}}}`;
    const r = await fetch('https://graphql.anilist.co',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({query:q,variables:{n}})});
    const d = await r.json();
    return d?.data?.Character?.image?.large || null;
}

function filter(type, btn) {
    document.querySelectorAll('#filter button').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    document.querySelectorAll('.card').forEach(c=>{
        c.style.display = (type==='all' || c.dataset.status===type) ? '' : 'none';
    });
}

function updateStats() {
    const pct = Math.round((done/CHARS.length)*100);
    document.getElementById('stats').textContent = `⏳ ${pct}% — ✅ ${ok} OK  ❌ ${fail} échecs  (${done}/${CHARS.length})`;
}

async function run() {
    const grid = document.getElementById('grid');
    CHARS.forEach(name => {
        const c = document.createElement('div');
        c.className = 'card pending'; c.id = 'c_'+name.replace(/\W/g,'_'); c.dataset.status='pending';
        c.innerHTML = `<div class="placeholder">⏳</div><div class="name">${name}</div><div class="status">...</div>`;
        grid.appendChild(c);
    });

    for (let i=0; i<CHARS.length; i+=4) {
        await Promise.all(CHARS.slice(i,i+4).map(async name => {
            const c = document.getElementById('c_'+name.replace(/\W/g,'_'));
            try {
                const url = await fetchImg(name);
                done++;
                if (url) {
                    ok++;
                    c.className='card ok'; c.dataset.status='ok';
                    c.innerHTML=`<img src="${url}" alt="${name}"><div class="name">${name}</div><div class="status">✅ ${NAME_MAP[name]||name}</div>`;
                } else {
                    fail++; fails.push(name);
                    c.className='card fail'; c.dataset.status='fail';
                    c.innerHTML=`<div class="placeholder">❌</div><div class="name">${name}</div><div class="status">introuvable</div>`;
                }
            } catch(e) {
                done++; fail++; fails.push(name);
                c.className='card fail'; c.dataset.status='fail';
                c.innerHTML=`<div class="placeholder">⚠️</div><div class="name">${name}</div><div class="status">erreur</div>`;
            }
            updateStats();
        }));
        await new Promise(r=>setTimeout(r,250));
    }

    document.getElementById('stats').textContent = `✅ ${ok} OK  ❌ ${fail} échecs sur ${CHARS.length} personnages`;
    if (fails.length) {
        document.getElementById('fail-list').style.display='block';
        document.getElementById('fail-names').innerHTML = fails.map(n=>`<p>❌ <b>${n}</b> (recherché: "${NAME_MAP[n]||n}")</p>`).join('');
    }
}
run();
</script>
</body>
</html>
